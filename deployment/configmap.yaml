apiVersion: v1
kind: ConfigMap
metadata:
  name: cert-parser-config
  namespace: cert-parser
  labels:
    app: cert-parser
data:
  # ── pydantic-settings uses "__" as nested delimiter ──────────────────────
  # AUTH__URL maps to auth.url, DATABASE__HOST maps to database.host, etc.
  #
  # All service URLs use in-cluster DNS: <service-name>.<namespace>.svc.cluster.local
  # prt-services-simulator runs in namespace "prt-simulator" on port 8087.
  # PostgreSQL runs in namespace "postgres" (service: blue-postgres) on port 5432.

  # ── OpenID Connect (Step 1: access token) ────────────────────────────────
  # Simulator endpoint: POST /protocol/openid-connect/token
  AUTH__URL: "http://prt-services-simulator.prt-simulator.svc.cluster.local:8087/protocol/openid-connect/token"
  AUTH__CLIENT_ID: "cert-parser-client"
  AUTH__USERNAME: "operator@border.gov"

  # ── SFC Login (Step 2: SFC token) ────────────────────────────────────────
  # Simulator endpoint: POST /auth/v1/login
  LOGIN__URL: "http://prt-services-simulator.prt-simulator.svc.cluster.local:8087/auth/v1/login"
  LOGIN__BORDER_POST_ID: "1"
  LOGIN__BOX_ID: "XX/99/X"
  LOGIN__PASSENGER_CONTROL_TYPE: "1"

  # ── Certificate Download (Step 3) ────────────────────────────────────────
  # Simulator endpoint: GET /certificates/csca
  DOWNLOAD__URL: "http://prt-services-simulator.prt-simulator.svc.cluster.local:8087/certificates/csca"

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  # Service: blue-postgres in namespace "postgres", port 5432.
  # DATABASE__DSN in secret.yaml overrides these individual fields if set.
  DATABASE__HOST: "blue-postgres.postgres.svc.cluster.local"
  DATABASE__PORT: "5432"
  DATABASE__NAME: "cert_parser_db"
  DATABASE__USERNAME: "cert_parser"

  # ── HTTP client ───────────────────────────────────────────────────────────
  HTTP_TIMEOUT_SECONDS: "60"

  # ── Scheduler (5-field cron: minute hour dom month dow) ───────────────────
  # "0 */6 * * *" = every 6 hours
  # "0 2 * * *"   = daily at 02:00
  # "*/5 * * * *" = every 5 minutes (testing)
  SCHEDULER__CRON: "0 */6 * * *"

  # ── Application ───────────────────────────────────────────────────────────
  RUN_ON_STARTUP: "false"
  LOG_LEVEL: "INFO"

  # ── API Gateway root path ─────────────────────────────────────────────────
  # FastAPI uses ROOT_PATH to generate correct URLs in OpenAPI docs and redirects
  # when the service is exposed behind an API gateway with a path prefix.
  # The gateway must strip this prefix before forwarding to the pod (or use
  # nginx.ingress.kubernetes.io/rewrite-target: / in the Ingress).
  # Internal cluster traffic (health probes, pod-to-pod) is unaffected —
  # probes hit the pod directly on port 8000 with no prefix.
  ROOT_PATH: "/prt-cert-parser"

