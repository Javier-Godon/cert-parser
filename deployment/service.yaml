apiVersion: v1
kind: Service
metadata:
  name: cert-parser
  namespace: cert-parser
  labels:
    app: cert-parser
spec:
  type: ClusterIP
  selector:
    app: cert-parser
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP

---

# Ingress: exposes the service behind an API gateway at /prt-cert-parser.
#
# How it works:
#   External request:  GET /prt-cert-parser/health
#   nginx rewrites to: GET /health              (strips the prefix)
#   Pod receives:      GET /health  (on port 8000, no prefix)
#   FastAPI root_path: "/prt-cert-parser"       (set via ROOT_PATH env var in ConfigMap)
#
# The ROOT_PATH env var tells FastAPI where it is mounted on the gateway so it
# generates correct absolute URLs in OpenAPI docs, redirects, etc.
# Kubernetes liveness/readiness probes hit the pod directly (no Ingress, no prefix) —
# so probe paths remain /health and /ready without any prefix.
#
# nginx capture-group rewrite pattern:
#   path: /prt-cert-parser(/|$)(.*)
#   rewrite-target: /$2
# This correctly handles both /prt-cert-parser and /prt-cert-parser/health etc.
#
# NOTE: configuration-snippet is intentionally NOT used — snippet annotations are
# disabled by the nginx ingress administrator (security hardening). The X-Forwarded-Prefix
# header is not needed because ROOT_PATH is already injected via ConfigMap env var.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cert-parser-ingress
  namespace: cert-parser
  labels:
    app: cert-parser
  annotations:
    # Strip /prt-cert-parser prefix before forwarding to the pod.
    # $2 captures everything after the prefix (including the leading slash).
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"  # Uncomment if using cert-manager
spec:
  ingressClassName: nginx  # Adjust to your ingress controller
  rules:
  - http:
      paths:
      - path: /prt-cert-parser(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: cert-parser
            port:
              number: 8000
  # tls:                                       # Uncomment when TLS is configured
  # - hosts:
  #   - your-gateway-host.example.com
  #   secretName: cert-parser-tls
