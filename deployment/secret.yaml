apiVersion: v1
kind: Secret
metadata:
  name: cert-parser-secrets
  namespace: cert-parser
  labels:
    app: cert-parser
type: Opaque
stringData:
  # ── OpenID Connect credentials ────────────────────────────────────────────
  # Must match the simulator's expected values (prt-simulator-config configmap).
  AUTH__CLIENT_SECRET: "super-secret-123"
  AUTH__PASSWORD: "operator-pass"

  # ── PostgreSQL password ───────────────────────────────────────────────────
  # Individual field — combined with ConfigMap values at runtime.
  # Alternatively, set DATABASE__DSN to override all individual fields:
  # DATABASE__DSN: "postgresql://cert_parser:password@blue-postgres.postgres.svc.cluster.local:5432/cert_parser_db"
  DATABASE__PASSWORD: "postgres"

# ── Production note ───────────────────────────────────────────────────────────
# Do NOT store real credentials in this file.
# Manage secrets externally (Sealed Secrets, External Secrets Operator, Vault).
# Example with Sealed Secrets:
#   kubeseal < secret.yaml > sealed-secret.yaml
#   kubectl apply -f sealed-secret.yaml
